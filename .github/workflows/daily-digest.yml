name: Daily Digest Cron

on:
  schedule:
    # 每天北京时间 9:35 = UTC 1:35
    - cron: '35 1 * * *'
  workflow_dispatch: # 手动触发

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Call digest API
        run: |
          curl -s -X POST "https://aiweb-roan.vercel.app/api/cron/digest" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 120